name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'develop'

jobs:
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      tag: ${{ steps.set-env.outputs.tag }}

    steps:
    - name: Resolve target environment from branch
      id: set-env
      run: |
        BRANCH="${{ inputs.branch }}"
        TAG=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/\//-/g')
        echo "tag=$TAG" >> $GITHUB_OUTPUT

        if [[ "$BRANCH" == feature/* || "$BRANCH" == "develop" ]]; then
          echo "environment=int" >> $GITHUB_OUTPUT
        elif [[ "$BRANCH" == "crt" ]]; then
          echo "environment=crt" >> $GITHUB_OUTPUT
        elif [[ "$BRANCH" == "uat" ]]; then
          echo "environment=uat" >> $GITHUB_OUTPUT
        elif [[ "$BRANCH" == "prod" ]]; then
          echo "environment=prod" >> $GITHUB_OUTPUT
        else
          echo "environment=int" >> $GITHUB_OUTPUT
        fi

  deploy:
    runs-on: ubuntu-latest
    needs: resolve-environment
    environment: ${{ needs.resolve-environment.outputs.environment }}

    steps:
    - name: Set lowercase image
      id: repo
      run: echo "image=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Deploy ${{ inputs.branch }} to ${{ needs.resolve-environment.outputs.environment }}
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}
          docker pull ${{ steps.repo.outputs.image }}:${{ needs.resolve-environment.outputs.tag }}
          docker stop cicd-app || true
          docker rm cicd-app || true
          docker run -d --name cicd-app -p 8080:8080 ${{ steps.repo.outputs.image }}:${{ needs.resolve-environment.outputs.tag }}
